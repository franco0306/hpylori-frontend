<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1280" />
  <title>EndoScan AI · Detección de H. pylori</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />

  <!-- React UMD (producción ligera vía CDN). Reemplaza por tu propia copia si despliegas offline. -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Bloquea drag & drop fuera de las dropzones (UX) -->
  <script>
    window.addEventListener("dragover", function (e) {
      if (!e.target.closest || !e.target.closest("[data-dropzone]")) {
        e.preventDefault();
        if (e.dataTransfer) e.dataTransfer.dropEffect = "none";
      }
    }, false);
    window.addEventListener("drop", function (e) {
      if (!e.target.closest || !e.target.closest("[data-dropzone]")) {
        e.preventDefault();
      }
    }, false);
  </script>

  <!-- App como módulo ES. Sirve los archivos vía un servidor HTTP (no funciona con file://). -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
